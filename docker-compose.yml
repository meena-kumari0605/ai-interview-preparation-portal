version: '3.8'

services:
  mongodb:
    image: mongo:6.0
    container_name: interviewai_mongodb
    restart: always
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: interviewai
    volumes:
      - mongodb_data:/data/db

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: interviewai_server
    restart: always
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - NODE_ENV=production
      - MONGODB_URI=mongodb://mongodb:27017/interviewai
      - JWT_SECRET=super_secret_interviewai_jwt_key_2026_production
      - GROQ_API_KEY=${GROQ_API_KEY}
      - MODEL_NAME=llama-3.3-70b-versatile
    depends_on:
      - mongodb

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: interviewai_client
    restart: always
    ports:
      - "80:80"
    depends_on:
      - server

volumes:
  mongodb_data:
